[app]
title = "Haiku Bot"
welcome_message = "How can I help you today?"
access_mode = "public"
disable_admin = true

[model]
provider = "azure_apim"
name = "gpt-5.4-mini"
allow_user_selection = true
allowed_models = "gpt-5.4-nano,gpt-5.4-mini,gpt-5.6-sol,deepseek-v4-pro,grok-4.1-fast-reasoning,llama-4-maverick,kimi-k2.6,mistral-large-3,phi-4-mini,gpt-4.1-nano,gpt-4.1-mini"
base_url = "https://tulane-asklit-gateway.azure-api.net/asklit"
use_local_embeddings = true
local_embedding_model = "all-MiniLM-L6-v2"

[retrieval]

[limits]

[logging]
enabled = true

[branding]
favicon_url = "https://github.com/SuffolkLITLab/logos/raw/main/current-logo/png/lit-favicon.png"
logo_url = "https://github.com/SuffolkLITLab/logos/raw/main/current-logo/png/lit-lab-logo-large.png"
homepage_url = "https://suffolklitlab.org"
supplemental_footer_text = ""
hide_asklit_badge = false
